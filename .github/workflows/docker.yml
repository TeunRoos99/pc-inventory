name: Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lees versienummer
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/teunroos99/pc-inventory:latest
            ghcr.io/teunroos99/pc-inventory:${{ steps.version.outputs.VERSION }}

      - name: Samenvatting
        run: |
          echo "### ✅ Docker image gepusht" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/teunroos99/pc-inventory:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/teunroos99/pc-inventory:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
